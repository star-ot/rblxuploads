name: Studio Vault CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  validate-assets:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate CI fixtures (naming policy)
        run: npm run validate:assets -- ./fixtures/ci-assets --pattern "^UI_[A-Za-z0-9_]+$"
      - name: Expect policy violations in negative fixtures
        run: |
          npm run validate:assets -- ./fixtures/policy-violations --pattern "^UI_[A-Za-z0-9_]+$" && exit 1 || exit 0

  upload-fixtures:
    runs-on: ubuntu-latest
    needs: validate-assets
    if: github.event_name == 'push' && secrets.ROBLOX_OPEN_CLOUD_KEY != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Upload fixture assets to Roblox
        run: npm run cli -- upload ./fixtures/ci-assets --format json
        env:
          ROBLOX_OPEN_CLOUD_KEY: ${{ secrets.ROBLOX_OPEN_CLOUD_KEY }}
          ROBLOX_CREATOR_ID: ${{ secrets.ROBLOX_CREATOR_ID }}
          ROBLOX_CREATOR_TYPE: ${{ secrets.ROBLOX_CREATOR_TYPE }}
      - name: Upload library manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-manifest
          path: .studio-vault/library.manifest.json
          if-no-files-found: ignore
